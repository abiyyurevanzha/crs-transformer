<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global CRS Transformer</title>

    <link rel="icon" href="assets/TM.jpeg" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap4.min.css" rel="stylesheet">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
</head>

<body class="bg-slate-100 text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden flex flex-col md:flex-row">

        <div class="w-full md:w-1/2 p-6 md:p-8 border-r border-gray-200">
            <div class="mb-6 border-b pb-4">
                <h1 class="text-3xl font-extrabold text-blue-800 flex items-center gap-2">
                    <img src="assets/TM.jpeg" alt="Logo" class="w-10 h-10 round-full shadow-md object-cover">
                    <span>Web CRS Transformer</span>
                </h1>
                <p class="text-sm text-gray-500 mt-1">Spatial Integrator</p>
            </div>

            <h2 class="text-md font-bold text-gray-700 mb-3 bg-gray-100 p-2 rounded">1. Coordinate References</h2>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Source CRS (From):</label>
                <select id="source-crs" placeholder="Cari nama datum..."></select>
            </div>
            <div class="mb-6">
                <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Target CRS (To):</label>
                <select id="target-crs" placeholder="Cari nama datum..."></select>
            </div>

            <h2 class="text-md font-bold text-gray-700 mb-3 bg-gray-100 p-2 rounded flex justify-between items-center">
                <span>2. Coordinate Point</span>
                <select id="format-toggle" class="text-sm font-normal p-1 border rounded bg-white">
                    <option value="dd">Format: Desimal (DD)</option>
                    <option value="dms">Format: Deg, Min, Sec (DMS)</option>
                </select>
            </h2>

            <div id="input-dd-group" class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label id="label-in-x" class="block text-sm font-bold text-blue-600">Longitude (X):</label>
                    <input type="number" id="input-x" step="any"
                        class="mt-1 w-full p-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none transition"
                        value="107.61">
                </div>
                <div>
                    <label id="label-in-y" class="block text-sm font-bold text-blue-600">Latitude (Y):</label>
                    <input type="number" id="input-y" step="any"
                        class="mt-1 w-full p-2.5 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none transition"
                        value="-6.91">
                </div>
            </div>

            <div id="input-dms-group" class="mb-6 hidden">
                <div class="mb-3">
                    <label class="block text-sm font-bold text-blue-600 mb-1">Longitude (X):</label>
                    <div class="flex gap-2">
                        <input type="number" id="lon-d" placeholder="Deg"
                            class="w-1/4 p-2 border-2 border-gray-200 rounded-lg">
                        <input type="number" id="lon-m" placeholder="Min"
                            class="w-1/4 p-2 border-2 border-gray-200 rounded-lg">
                        <input type="number" id="lon-s" step="any" placeholder="Sec"
                            class="w-1/4 p-2 border-2 border-gray-200 rounded-lg">
                        <select id="lon-dir" class="w-1/4 p-2 border-2 border-gray-200 rounded-lg">
                            <option value="E">E (East)</option>
                            <option value="W">W (West)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-blue-600 mb-1">Latitude (Y):</label>
                    <div class="flex gap-2">
                        <input type="number" id="lat-d" placeholder="Deg"
                            class="w-1/4 p-2 border-2 border-gray-200 rounded-lg">
                        <input type="number" id="lat-m" placeholder="Min"
                            class="w-1/4 p-2 border-2 border-gray-200 rounded-lg">
                        <input type="number" id="lat-s" step="any" placeholder="Sec"
                            class="w-1/4 p-2 border-2 border-gray-200 rounded-lg">
                        <select id="lat-dir" class="w-1/4 p-2 border-2 border-gray-200 rounded-lg">
                            <option value="N">N (North)</option>
                            <option value="S">S (South)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button id="btn-convert"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-lg transition-colors shadow-md">
                Run Transformation
            </button>

            <h2 class="text-md font-bold text-gray-700 mt-8 mb-3 bg-gray-100 p-2 rounded">3. Conversion Result</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label id="label-out-x" class="block text-sm font-bold text-emerald-600">Output X:</label>
                    <textarea id="output-x" rows="2" readonly
                        class="mt-1 w-full p-2 border border-emerald-200 bg-emerald-50 rounded-lg text-emerald-800 font-mono text-sm shadow-inner resize-none"></textarea>
                </div>
                <div>
                    <label id="label-out-y" class="block text-sm font-bold text-emerald-600">Output Y:</label>
                    <textarea id="output-y" rows="2" readonly
                        class="mt-1 w-full p-2 border border-emerald-200 bg-emerald-50 rounded-lg text-emerald-800 font-mono text-sm shadow-inner resize-none"></textarea>
                </div>
            </div>

            <div id="error-msg"
                class="mt-4 text-red-600 text-sm hidden font-semibold bg-red-50 p-3 rounded-lg border border-red-200">
            </div>
        </div>

        <div class="w-full md:w-1/2 bg-gray-200 relative">
            <div id="map" class="w-full h-96 md:h-full min-h-[800px] z-0"></div>
        </div>
    </div>

    <footer class="max-w-6xl mx-auto mt-6 mb-4 text-center">
        <p class="text-sm text-gray-500 font-medium">
            &copy; 2026 Abiyyu Daffa Revanzha.
            <span class="block md:inline mt-1 md:mt-0 text-gray-400">
                | Supporting Those in Need
            </span>
        </p>
    </footer>

    <script src="src/crs_database.js"></script>
    <script src="src/map.js"></script>
    <script src="src/converter.js"></script>
    <script src="src/app.js"></script>
</body>

</html>
